<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Gerenciador para tarefas de rotina">
    <meta name="keywords" content="gerenciador, tarefas, organização, tasks">
    <meta name="author" content="Antonio Lucus">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>Gerenciador de Tarefas</h1>

    <form id="task-form">
     
        <!--titulo da tarefa-->
        <input id= "title" type="text" placeholder="Digite uma tarefa" required>

        <!--Descrição da tarefa-->
        <input id= "description" type="text" placeholder="Descrição da tarefa">
 
        <!--Botão responsavel por enviar o requerimento-->
        <button>ADICIONAR</button>

    </form>
    


    <ul id="task-list"></ul>
    </div>
     <script src="script.js"></script>
</body>
</body>


</html>
